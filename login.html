<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockIQ - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>StockIQ Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUser" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" required placeholder="Enter password">
            </div>
            <button type="submit" class="auth-btn">Login</button>
        </form>
        <p>New user? <a href="register.html">Register here</a></p>
        <p><a href="index.html" style="color: var(--accent);">Back to Home</a></p>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById("loginUser").value;
            const password = document.getElementById("loginPass").value;

            const res = await fetch("http://localhost:5001/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (data.success) {
                localStorage.setItem("userId", data.userId);
                localStorage.setItem("username", data.username);
                alert("Login successful!");
                window.location.href = "index.html";
            } else {
                alert(data.message);
            }
        };
    </script>
</body>
</html>
