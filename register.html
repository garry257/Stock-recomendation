<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockIQ - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>StockIQ Register</h1>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUser" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPass" required placeholder="Choose a password">
            </div>
            <button type="submit" class="auth-btn">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
        <p><a href="index.html" style="color: var(--accent);">Back to Home</a></p>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById("registerForm").onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById("regUser").value;
            const password = document.getElementById("regPass").value;

            const res = await fetch("http://localhost:5001/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (data.success) {
                alert("Registration successful! Please login.");
                window.location.href = "login.html";
            } else {
                alert(data.message);
            }
        };
    </script>
</body>
</html>
